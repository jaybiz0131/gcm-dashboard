name: Traffic pull

on:
  schedule:
    # Sundays 23:00 UTC, about 19:00 ET. Flip to daily = change this line to "0 23 * * *".
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: traffic-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Pull traffic, update history, write report
        env:
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
          # accepts either secret name; ANTHROPIC_KEY is what exists on this repo
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.ANTHROPIC_KEY }}
        run: python3 scripts/pull_traffic.py

      - name: Commit and push
        run: |
          git config user.name "gcm-dashboard-bot"
          git config user.email "gcm-dashboard-bot@users.noreply.github.com"
          git add data reports
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            WEEK=$(python3 -c "import json; print(json.load(open('data/traffic-history.json'))['weeks'][-1]['week_ending'])")
            git commit -m "traffic: week ending $WEEK"
            git push
          fi

      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Traffic pull failed, ${new Date().toISOString().slice(0, 10)}`,
              body: `The weekly traffic pull failed before committing anything, so the published data is untouched. Run log: ${runUrl}`,
            });
